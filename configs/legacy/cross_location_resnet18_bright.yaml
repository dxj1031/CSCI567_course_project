experiment_name: cross_location_resnet18_brightness_aligned
seed: 42
paths:
  images_dir: ${DATA_ROOT}/images
  output_root: ${OUTPUT_ROOT}
datasets:
  train:
    csv: ${DATA_ROOT}/processed/cct20_train.csv
    filters:
      day_night: null
  val:
    csv: ${DATA_ROOT}/processed/cct20_val.csv
    filters:
      day_night: null
  tests:
    cis:
      csv: ${DATA_ROOT}/processed/cct20_cis.csv
      filters:
        day_night: null
    trans:
      csv: ${DATA_ROOT}/processed/cct20_trans.csv
      filters:
        day_night: null
label_space:
  class_names: null
model:
  name: resnet18
  pretrained: true
  img_size: 224
training:
  batch_size: 32
  epochs: 15
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 4
  early_stopping_patience: 3
  selection_metric: macro_f1
  limit_train_batches: null
  limit_eval_batches: null
  train_intervention: brightness_aligned
  train_intervention_params: {}
system:
  device: auto
