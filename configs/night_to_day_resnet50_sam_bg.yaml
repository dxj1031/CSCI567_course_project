experiment_name: night_to_day_resnet50_sam_bg
seed: 42

paths:
  images_dir: ${DATA_ROOT}/images
  output_root: ${OUTPUT_ROOT}

datasets:
  train:
    csv: ${DATA_ROOT}/processed/cct20_train.csv
    filters:
      day_night: night
  val:
    csv: ${DATA_ROOT}/processed/cct20_val.csv
    filters:
      day_night: night
  tests:
    val_day:
      csv: ${DATA_ROOT}/processed/cct20_val.csv
      filters:
        day_night: day
    cis_day:
      csv: ${DATA_ROOT}/processed/cct20_cis.csv
      filters:
        day_night: day
    trans_day:
      csv: ${DATA_ROOT}/processed/cct20_trans.csv
      filters:
        day_night: day

label_space:
  class_names:
    - bird
    - bobcat
    - cat
    - coyote
    - dog
    - opossum
    - rabbit
    - raccoon
    - rodent
    - skunk

model:
  name: resnet50
  pretrained: true
  img_size: 224

training:
  batch_size: 32
  epochs: 15
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 4
  early_stopping_patience: 3
  selection_metric: macro_f1
  limit_train_batches: null
  limit_eval_batches: null

system:
  device: auto
